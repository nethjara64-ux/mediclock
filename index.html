<body>
 
<!-- TOAST CONTAINER -->

<!-- HEADER -->

<script>
// ── STATE ──────────────────────────────────────────────────────────────────
let meds = JSON.parse(localStorage.getItem('meds') || '[]');
let logs = JSON.parse(localStorage.getItem('logs') || '[]');
let editingId = null;
let pendingTimes = [];
let historyFilter = 'all';
let alerted = new Set();
 
// Sample data if empty
if (!meds.length) {
  meds = [
    { id: 1, name: 'Omeprazol 20mg', dose: '1 cápsula', emoji: '💊', color: 'blue', notes: 'Tomar con estómago vacío', times: ['07:00', '19:00'], active: true },
    { id: 2, name: 'Metformina 500mg', dose: '1 tableta', emoji: '🔵', color: 'green', notes: 'Con las comidas', times: ['08:00', '13:00', '20:00'], active: true },
    { id: 3, name: 'Vitamina D3', dose: '1 gota', emoji: '🌟', color: 'orange', notes: '', times: ['08:00'], active: true },
  ];
  saveMeds();
}
 
function saveMeds() { localStorage.setItem('meds', JSON.stringify(meds)); }
function saveLogs()  { localStorage.setItem('logs', JSON.stringify(logs)); }
 
// ── CLOCK ──────────────────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clockDisplay').textContent = `${h}:${m}:${s}`;
  checkAlerts(now);
}
setInterval(updateClock, 1000);
updateClock();
 
// ── ALERTS ────────────────────────────────────────────────────────────────
function checkAlerts(now) {
  const today = dateStr(now);
  const timeNow = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  meds.filter(m => m.active).forEach(med => {
    med.times.forEach(t => {
      const key = `${today}-${med.id}-${t}`;
      if (t === timeNow && !alerted.has(key)) {
        const alreadyLogged = logs.find(l => l.medId === med.id && l.date === today && l.time === t);
        if (!alreadyLogged) {
          alerted.add(key);
          showToast(`⏰ Hora de tu medicamento`, `${med.emoji} ${med.name} — ${med.dose}`, 'alert');
          if (Notification.permission === 'granted') {
            new Notification(`⏰ ${med.name}`, { body: `Es hora de tomar ${med.dose}`, icon: '' });
          }
          renderAll();
        }
      }
    });
  });
}
 
// Request notification permission
if ('Notification' in window && Notification.permission === 'default') {
  Notification.requestPermission();
}
 
// ── HELPERS ───────────────────────────────────────────────────────────────
function dateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function today() { return dateStr(new Date()); }
function formatDate(str) {
  const [y,m,d] = str.split('-');
  const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  const days = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const date = new Date(y, m-1, d);
  const t = today();
  if (str === t) return 'Hoy';
  const yest = new Date(); yest.setDate(yest.getDate()-1);
  if (str === dateStr(yest)) return 'Ayer';
  return `${days[date.getDay()]} ${d} ${months[m-1]}`;
}
function colorClass(c) { return `c-${c}`; }
function colorVar(c) {
  return {blue:'--accent',green:'--green',orange:'--orange',purple:'--purple'}[c] || '--accent';
}
 
// ── TODAY ─────────────────────────────────────────────────────────────────
function renderToday() {
  const td = today();
  const now = new Date();
  const nowMins = now.getHours()*60 + now.getMinutes();
 
  let allDoses = [];
  meds.filter(m => m.active).forEach(med => {
    med.times.forEach(t => {
      const [h,min] = t.split(':').map(Number);
      const tMins = h*60+min;
      const log = logs.find(l => l.medId===med.id && l.date===td && l.time===t);
      let status = log ? log.status : (tMins < nowMins ? 'missed' : 'pending');
      allDoses.push({ med, time: t, tMins, status, log });
    });
  });
  allDoses.sort((a,b) => a.tMins - b.tMins);
 
  // Stats
  const taken = allDoses.filter(d => d.status==='taken').length;
  const missed = allDoses.filter(d => d.status==='missed').length;
  const pending = allDoses.filter(d => d.status==='pending').length;
  const total = allDoses.length || 1;
  document.getElementById('statTaken').textContent = taken;
  document.getElementById('statPending').textContent = pending;
  document.getElementById('statMissed').textContent = missed;
  document.getElementById('progressTaken').style.width = `${Math.round(taken/total*100)}%`;
 
  // Alert banners for doses due now (±5 min)
  const banners = allDoses.filter(d => {
    if (d.status !== 'pending') return false;
    return Math.abs(d.tMins - nowMins) <= 5;
  });
  const ab = document.getElementById('alertBanners');
  ab.innerHTML = banners.map(d => `
    <div class="alert-banner">
      <div class="alert-banner-icon">${d.med.emoji}</div>
      <div class="alert-banner-info">
        <div class="alert-banner-title">¡Hora de ${d.med.name}!</div>
        <div class="alert-banner-sub">${d.med.dose} · ${d.time}</div>
      </div>
      <button class="btn-take-now" onclick="markDose(${d.med.id},'${d.time}','taken')">Tomé ✓</button>
    </div>
  `).join('');
 
  // List
  const el = document.getElementById('todayList');
  if (!allDoses.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">📋</div><h3>Sin medicamentos hoy</h3><p>Agrega tus medicamentos en la pestaña "Medicamentos"</p></div>`;
    return;
  }
  el.innerHTML = allDoses.map(d => {
    const isPending = d.status === 'pending';
    const isTaken = d.status === 'taken';
    const isMissed = d.status === 'missed';
    const statusIcon = isTaken ? '✓' : isMissed ? '✕' : '○';
    const statusClass = isTaken ? 'status-taken' : isMissed ? 'status-missed' : 'status-pending';
    const actions = isPending ? `
      <button class="btn-take" onclick="markDose(${d.med.id},'${d.time}','taken')">✓ Tomé</button>
      <button class="btn-skip" onclick="markDose(${d.med.id},'${d.time}','missed')">✕ Omitir</button>` :
      isMissed ? `<button class="btn-take" onclick="markDose(${d.med.id},'${d.time}','taken')">↩ Tomé tarde</button>` : '';
    return `
      <div class="history-item" style="margin-bottom:8px;opacity:${isMissed?'.7':'1'}">
        <div class="history-status ${statusClass}">${statusIcon}</div>
        <div style="font-size:20px">${d.med.emoji}</div>
        <div class="history-info">
          <div class="history-name">${d.med.name}</div>
          <div class="history-detail">${d.med.dose}${d.med.notes ? ' · ' + d.med.notes : ''}</div>
        </div>
        <div class="history-time">${d.time}</div>
        <div class="history-action">${actions}</div>
      </div>`;
  }).join('');
}
 
function markDose(medId, time, status) {
  const td = today();
  const existing = logs.findIndex(l => l.medId===medId && l.date===td && l.time===time);
  const log = { medId, date: td, time, status, ts: Date.now() };
  if (existing >= 0) logs[existing] = log;
  else logs.push(log);
  saveLogs();
  renderAll();
  const med = meds.find(m => m.id===medId);
  if (status === 'taken') showToast('Dosis registrada ✓', `${med.emoji} ${med.name} — ${time}`, 'success');
}
 
// ── MEDS LIST ─────────────────────────────────────────────────────────────
function renderMeds() {
  const el = document.getElementById('medsList');
  if (!meds.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">💊</div><h3>Sin medicamentos</h3><p>Agrega tu primer medicamento para comenzar</p></div>`;
    return;
  }
  el.innerHTML = meds.map(med => `
    <div class="med-card">
      <div class="med-icon ${colorClass(med.color)}">${med.emoji}</div>
      <div class="med-info">
        <div class="med-name">${med.name}${!med.active ? ' <span style="font-size:11px;color:var(--text3);font-weight:400">(inactivo)</span>' : ''}</div>
        <div class="med-dose">${med.dose}${med.notes ? ' · ' + med.notes : ''}</div>
        <div class="med-times">
          ${med.times.map(t => `<span class="time-tag ${colorClass(med.color)}">${t}</span>`).join('')}
        </div>
      </div>
      <div class="med-actions">
        <button class="icon-btn" onclick="editMed(${med.id})" title="Editar">
          <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
        </button>
        <button class="icon-btn danger" onclick="deleteMed(${med.id})" title="Eliminar">
          <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
        </button>
      </div>
    </div>
  `).join('');
}
 
// ── HISTORY ───────────────────────────────────────────────────────────────
function renderHistory() {
  const el = document.getElementById('historyList');
  let filtered = [...logs].sort((a,b) => b.ts - a.ts);
  if (historyFilter !== 'all') filtered = filtered.filter(l => l.status === historyFilter);
 
  if (!filtered.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">📂</div><h3>Sin registros</h3><p>El historial de dosis aparecerá aquí</p></div>`;
    return;
  }
 
  const byDate = {};
  filtered.forEach(log => {
    if (!byDate[log.date]) byDate[log.date] = [];
    byDate[log.date].push(log);
  });
 
  el.innerHTML = Object.keys(byDate).sort((a,b) => b.localeCompare(a)).map(date => {
    const items = byDate[date];
    return `<div class="history-day">
      <div class="history-day-label">${formatDate(date)}</div>
      <div class="history-list">
        ${items.map(log => {
          const med = meds.find(m => m.id === log.medId);
          if (!med) return '';
          const isTaken = log.status === 'taken';
          return `<div class="history-item">
            <div class="history-status ${isTaken?'status-taken':'status-missed'}">${isTaken?'✓':'✕'}</div>
            <div style="font-size:18px">${med.emoji}</div>
            <div class="history-info">
              <div class="history-name">${med.name}</div>
              <div class="history-detail">${med.dose} · Programado: ${log.time}</div>
            </div>
            <div class="history-time" style="color:${isTaken?'var(--green)':'var(--red)'}">${isTaken?'Tomada':'Omitida'}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}
 
function filterHistory(f, el) {
  historyFilter = f;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderHistory();
}
 
function clearHistory() {
  if (confirm('¿Eliminar todo el historial de dosis?')) {
    logs = [];
    saveLogs();
    renderAll();
    showToast('Historial eliminado', 'Se borró todo el registro de dosis', 'info');
  }
}
 
// ── MODAL ─────────────────────────────────────────────────────────────────
function openModal(id) {
  editingId = id || null;
  pendingTimes = [];
  document.getElementById('modalTitle').textContent = id ? 'Editar medicamento' : 'Agregar medicamento';
  if (id) {
    const med = meds.find(m => m.id === id);
    document.getElementById('medName').value = med.name;
    document.getElementById('medDose').value = med.dose;
    document.getElementById('medEmoji').value = med.emoji;
    document.getElementById('medNotes').value = med.notes;
    document.getElementById('medColor').value = med.color;
    document.getElementById('medActive').value = med.active ? '1' : '0';
    pendingTimes = [...med.times];
  } else {
    document.getElementById('medName').value = '';
    document.getElementById('medDose').value = '';
    document.getElementById('medEmoji').value = '💊';
    document.getElementById('medNotes').value = '';
    document.getElementById('medColor').value = 'blue';
    document.getElementById('medActive').value = '1';
  }
  renderTimesRow();
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('medName').focus(), 100);
}
 
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}
 
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
 
function addTime() {
  const t = document.getElementById('newTime').value;
  if (!t) return;
  if (!pendingTimes.includes(t)) {
    pendingTimes.push(t);
    pendingTimes.sort();
  }
  document.getElementById('newTime').value = '';
  renderTimesRow();
}
 
function removeTime(t) {
  pendingTimes = pendingTimes.filter(x => x !== t);
  renderTimesRow();
}
 
function renderTimesRow() {
  const row = document.getElementById('timesRow');
  row.innerHTML = pendingTimes.map(t => `
    <div class="time-chip">${t}<button onclick="removeTime('${t}')">×</button></div>
  `).join('');
}
 
function saveMed() {
  const name = document.getElementById('medName').value.trim();
  const dose = document.getElementById('medDose').value.trim();
  if (!name) { document.getElementById('medName').focus(); return; }
  if (!dose) { document.getElementById('medDose').focus(); return; }
  if (!pendingTimes.length) { showToast('Falta el horario', 'Agrega al menos una hora', 'error'); return; }
 
  const data = {
    name,
    dose,
    emoji: document.getElementById('medEmoji').value || '💊',
    notes: document.getElementById('medNotes').value.trim(),
    color: document.getElementById('medColor').value,
    times: [...pendingTimes],
    active: document.getElementById('medActive').value === '1',
  };
 
  if (editingId) {
    const idx = meds.findIndex(m => m.id === editingId);
    meds[idx] = { ...meds[idx], ...data };
  } else {
    data.id = Date.now();
    meds.push(data);
  }
  saveMeds();
  closeModal();
  renderAll();
  showToast(editingId ? 'Medicamento actualizado' : 'Medicamento agregado', `${data.emoji} ${data.name}`, 'success');
}
 
function editMed(id) {
  openModal(id);
}
 
function deleteMed(id) {
  const med = meds.find(m => m.id === id);
  if (confirm(`¿Eliminar ${med.name}?`)) {
    meds = meds.filter(m => m.id !== id);
    saveMeds();
    renderAll();
    showToast('Medicamento eliminado', med.name, 'info');
  }
}
 
// ── TABS ─────────────────────────────────────────────────────────────────
function switchTab(tab, el) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  el.classList.add('active');
}
 
// ── TOAST ─────────────────────────────────────────────────────────────────
function showToast(title, msg, type) {
  const icons = { success:'✅', error:'❌', info:'ℹ️', alert:'🔔' };
  const cont = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = 'toast';
  t.innerHTML = `
    <div class="toast-icon">${icons[type]||'🔔'}</div>
    <div class="toast-content">
      <div class="toast-title">${title}</div>
      <div class="toast-msg">${msg}</div>
    </div>
    <button class="toast-close" onclick="this.closest('.toast').remove()">×</button>`;
  cont.appendChild(t);
  setTimeout(() => {
    t.classList.add('out');
    setTimeout(() => t.remove(), 300);
  }, 4000);
}
 
// ── RENDER ALL ────────────────────────────────────────────────────────────
function renderAll() {
  renderToday();
  renderMeds();
  renderHistory();
}
 
renderAll();
setInterval(renderToday, 30000);
 
// ── SERVICE WORKER ────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .then(() => console.log('✅ Service Worker registrado'))
      .catch(err => console.log('SW error:', err));
  });
}
 
// ── BANNER DE INSTALACIÓN ─────────────────────────────────────────────────
let deferredPrompt = null;
 
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  showInstallBanner();
});
 
function showInstallBanner() {
  if (document.getElementById('installBanner')) return;
  const banner = document.createElement('div');
  banner.id = 'installBanner';
  banner.style.cssText = `
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: #1a202c; color: white; border-radius: 14px;
    padding: 14px 20px; display: flex; align-items: center; gap: 14px;
    box-shadow: 0 8px 32px rgba(0,0,0,.3); z-index: 999;
    font-family: 'DM Sans', sans-serif; font-size: 14px;
    max-width: 360px; width: calc(100% - 40px);
    animation: toastIn .3s ease;
  `;
  banner.innerHTML = `
    <span style="font-size:22px">📲</span>
    <div style="flex:1">
      <div style="font-weight:600;margin-bottom:2px">Instalar MediClock</div>
      <div style="font-size:12px;opacity:.75">Accede rápido desde tu pantalla de inicio</div>
    </div>
    <button onclick="installApp()" style="
      background:#2d7dd2;color:white;border:none;border-radius:8px;
      padding:8px 14px;font-family:'DM Sans',sans-serif;font-size:13px;
      font-weight:600;cursor:pointer;white-space:nowrap;
    ">Instalar</button>
    <button onclick="document.getElementById('installBanner').remove()" style="
      background:none;border:none;color:rgba(255,255,255,.6);
      cursor:pointer;font-size:18px;padding:0 4px;line-height:1;
    ">×</button>
  `;
  document.body.appendChild(banner);
}
 
async function installApp() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('installBanner')?.remove();
  if (outcome === 'accepted') {
    showToast('¡App instalada! 🎉', 'MediClock ya está en tu pantalla de inicio', 'success');
  }
}
 
// iOS: muestra instrucciones manuales si no hay prompt nativo
const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
const isInStandalone = window.matchMedia('(display-mode: standalone)').matches;
if (isIOS && !isInStandalone) {
  setTimeout(() => {
    showToast(
      'Instalar en iPhone',
      'Toca el ícono compartir (□↑) y luego "Añadir a pantalla de inicio"',
      'info'
    );
  }, 3000);
}
</script>
